name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - v*

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-14
            target: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace
      - run: cargo build --release -p github-stats
      - run: |
          mkdir -p dist/${{ matrix.target }}
          cp target/release/github-stats dist/${{ matrix.target }}/github-stats
          tar -C dist/${{ matrix.target }} -czf github-stats-${{ matrix.target }}.tar.gz github-stats
          shasum -a 256 github-stats-${{ matrix.target }}.tar.gz > github-stats-${{ matrix.target }}.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: github-stats-${{ matrix.target }}
          path: |
            github-stats-${{ matrix.target }}.tar.gz
            github-stats-${{ matrix.target }}.sha256
